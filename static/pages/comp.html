<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Albion Tools - Group Builds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <link rel="stylesheet" href="/static/index.css">
    <script src="/static/js/comp.js"></script>
  </head>
  <body class="bg-gray-950 text-white font-sans max-h-screen flex flex-row">
    <header class="" x-data="{ html: ''}"
      x-init="fetch('/static/components/navbar.html').then(response => response.text()).then(data => html = data)"
      x-html="html"
    >
    </header>

    <div class="w-1/3 md:w-1/4 border-r border-gray-700 h-screen flex flex-col bg-gray-900 overflow-y-auto" x-data="inventoryManager">
      <div class="p-4 pl-16 border-b border-gray-700 flex-shrink-0">
        <input 
          type="text" 
          @keydown.enter.prevent="fetchItems($el.value)"
          placeholder="Type item name and press Enter..." 
          class="w-full h-[42px] bg-gray-800 border border-gray-700 text-white p-3 rounded focus:outline-none focus:border-indigo-500 transition-colors"
        >
      </div>

      <div class="p-4 overflow-y-auto flex-1 space-y-8 h-screen">
        <template x-if="inventoryIsLoading">
          <p class="text-indigo-400 animate-pulse">Synchronizing database...</p>
        </template>
        <template x-if="error">
          <p class="text-red-500" x-text="error"></p>
        </template>

        <div x-show="!inventoryIsLoading">
          <template x-for="(items, category) in inventory_items" :key="category">
            <div class="mb-6">
              <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <template x-for="(item, id) in items" :key="id">
                  <div class="bg-gray-800 border border-gray-700 p-2 rounded hover:border-indigo-500 transition-colors cursor-grab active:cursor-grabbing group aspect-square flex flex-col items-center justify-center"
                    draggable="true"
                    @dragstart="e => {
                    e.dataTransfer.setData('text/plain', JSON.stringify(item));
                    e.dataTransfer.effectAllowed = 'move';
                    }">

                    <div class="relative w-16 aspect-square bg-gray-900 mb-2">
                      <img :src="item.icon" :alt="item.name" class="h-16 w-16 object-contain" loading="lazy">
                      <span class="absolute top-0 right-0 bg-black/60 text-[10px] px-1" x-text="item.tier"></span>
                    </div>
                    <p class="text-xs font-semibold text-center truncate w-full text-gray-200 group-hover:text-indigo-300" x-text="item.name"></p>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <div class="w-2/3 md:w-3/4 h-screen overflow-y-auto p-2 bg-gray-800" x-data="compDetailComponent">
      <template x-if="isLoading">
        <p class="text-indigo-400 animate-pulse">Loading composition...</p>
      </template>

      <template x-if="error">
        <p class="text-red-500" x-text="error"></p>
      </template>

      <template x-if="!isLoading && activeBuild">
        <div class="max-w-[960px] mx-auto" id="comp-export-area">

          <input type="text" x-model="activeBuild.name" class="w-full bg-transparent font-serif text-2xl font-bold text-white my-2 border-b border-transparent hover:border-gray-500 focus:border-indigo-500 focus:outline-none transition-colors" placeholder="Composition Name">

          <template x-for="(role, index) in activeBuild.roles" :key="index">
            <div x-data="{
              activeSwapIndex: 0,
              get activeBuildRef() {
              return this.activeSwapIndex === 0 ? role.build : role.swaps[this.activeSwapIndex - 1];
              }
              }" 
              class="p-4 bg-gray-900 rounded-lg border mb-2 shadow-lg w-max relative group transition-colors duration-300"
              :class="activeSwapIndex === 0 ? 'border-indigo-500/30' : 'border-yellow-500/50'">

              <div class="flex flex-row items-center justify-between gap-4 mb-4 border-b border-gray-700/50 pb-2">

                <input type="text" x-model="role.name" 
                  class="flex-1 w-full bg-transparent font-bold font-serif text-lg px-2 border-b border-transparent focus:outline-none transition-colors" 
                  :class="activeSwapIndex === 0 ? 'text-indigo-400 hover:border-indigo-500/50 focus:border-indigo-500' : 'text-yellow-400 hover:border-yellow-500/50 focus:border-yellow-500'"
                  placeholder="Enter role name...">

                <div class="flex flex-row gap-1 bg-gray-800 p-1 rounded-md flex-shrink-0 role-swaps">
                  <button @click="activeSwapIndex = 0" 
                    class="px-2 py-1 text-[10px] uppercase tracking-wider font-bold rounded transition-colors" 
                    :class="activeSwapIndex === 0 ? 'bg-indigo-600 text-white shadow' : 'text-gray-400 hover:text-white hover:bg-gray-700'">
                    Main
                  </button>

                  <template x-for="(swap, sIndex) in (role.swaps || [])" :key="sIndex">
                    <button @click="activeSwapIndex = sIndex + 1" 
                      class="px-2 py-1 text-[10px] uppercase tracking-wider font-bold rounded transition-colors" 
                      :class="activeSwapIndex === sIndex + 1 ? 'bg-yellow-600 text-white shadow' : 'text-gray-400 hover:text-white hover:bg-gray-700'" 
                      x-text="`Alt ${sIndex + 1}`">
                    </button>
                  </template>

                  <button @click="addSwap(role)" class="px-2 py-1 text-xs text-gray-500 hover:text-emerald-400 font-bold transition-colors" title="Add Alternative Swap">+</button>
                </div>

                <div class="flex flex-row items-center gap-1 opacity-60 group-hover:opacity-100 transition-opacity ml-2 flex-shrink-0 action-buttons">
                  <button @click="moveRoleUp(index)" :disabled="index === 0" class="p-1 text-gray-400 hover:text-indigo-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Move Up">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                  </button>
                  <button @click="moveRoleDown(index)" :disabled="index === activeBuild.roles.length - 1" class="p-1 text-gray-400 hover:text-indigo-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Move Down">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                  </button>
                  <button @click="deleteRole(index)" class="p-1 text-gray-400 hover:text-red-500 transition-colors ml-1" title="Delete Role">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>

              </div>

              <div class="flex flex-wrap gap-2">
                <template x-for="slotName in ['weapon', 'off_hand', 'head', 'chest', 'feet', 'cape']" :key="slotName">
                  <div class="flex font-sans items-center justify-center border-2 w-16 lg:w-20 aspect-square bg-gray-800 transition-colors"
                    :class="activeBuildRef[slotName] ? 'border-gray-600' : 'border-dashed border-gray-700'"
                    @dragover.prevent="activeSwapIndex === 0 ? $el.classList.add('border-indigo-500', 'bg-gray-700') : $el.classList.add('border-yellow-500', 'bg-gray-700')"
                    @dragleave.prevent="$el.classList.remove('border-indigo-500', 'border-yellow-500', 'bg-gray-700')"
                    @drop.prevent="$el.classList.remove('border-indigo-500', 'border-yellow-500', 'bg-gray-700'); handleDrop($event, activeBuildRef, slotName);"
                    @contextmenu.prevent="if(activeBuildRef[slotName]) activeBuildRef[slotName] = null">


                    <template x-if="activeBuildRef[slotName]">
                      <img :src="activeBuildRef[slotName].icon" :alt="activeBuildRef[slotName].name" 
                        class="w-full h-full object-contain pointer-events-none"
                        x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0 transform scale-75"
                        x-transition:enter-end="opacity-100 transform scale-100">
                    </template>
                    <template x-if="!activeBuildRef[slotName]">
                      <span class="text-gray-500 text-[10px] uppercase font-bold pointer-events-none" x-text="slotName"></span>
                    </template>
                  </div>
                </template>

                <div class="flex flex-col gap-2">
                  <template x-for="slotName in ['food', 'potion']" :key="slotName">
                    <div class="flex items-center justify-center border-2 w-10 aspect-square bg-gray-800 transition-colors"
                      :class="activeBuildRef[slotName] ? 'border-gray-600' : 'border-dashed border-gray-700'"
                      @dragover.prevent="activeSwapIndex === 0 ? $el.classList.add('border-indigo-500', 'bg-gray-700') : $el.classList.add('border-yellow-500', 'bg-gray-700')"
                      @dragleave.prevent="$el.classList.remove('border-indigo-500', 'border-yellow-500', 'bg-gray-700')"
                      @drop.prevent="$el.classList.remove('border-indigo-500', 'border-yellow-500', 'bg-gray-700'); handleDrop($event, activeBuildRef, slotName);"
                      @contextmenu.prevent="if(activeBuildRef[slotName]) activeBuildRef[slotName] = null">

                      <template x-if="activeBuildRef[slotName]">
                        <img :src="activeBuildRef[slotName].icon" :alt="activeBuildRef[slotName].name" 
                          class="w-full h-full object-contain pointer-events-none"
                          x-transition:enter="transition ease-out duration-200"
                          x-transition:enter-start="opacity-0 transform scale-75"
                          x-transition:enter-end="opacity-100 transform scale-100">
                      </template>
                      <template x-if="!activeBuildRef[slotName]">
                        <span class="text-gray-500 text-[8px] uppercase font-bold pointer-events-none" x-text="slotName"></span>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
          <div class="flex flex-row flex-wrap gap-2 mb-8">

            <div @click="addEmptyRole()" class="flex-1 max-w-[120px] h-12 border-2 border-dashed border-gray-600 rounded-lg flex items-center justify-center cursor-pointer hover:border-indigo-400 hover:text-indigo-400 hover:bg-gray-800/50 transition-colors text-gray-500 text-xs">
              <span class="font-bold uppercase tracking-wider">+ Add</span>
            </div>

            <div @click="updateBuild()" class="flex-1 max-w-[120px] h-12 border-2 border-solid border-indigo-600 rounded-lg flex items-center justify-center cursor-pointer hover:bg-indigo-600 hover:text-white transition-colors text-indigo-400 text-xs">
              <span class="font-bold uppercase tracking-wider text-center">Update</span>
            </div>

            <div @click="saveAsNewBuild()" class="flex-1 max-w-[120px] h-12 border-2 border-solid border-emerald-600 rounded-lg flex items-center justify-center cursor-pointer hover:bg-emerald-600 hover:text-white transition-colors text-emerald-400 text-xs">
              <span class="font-bold uppercase tracking-wider text-center">Save New</span>
            </div>

            <div @click="exportAsImage()" class="flex-1 max-w-[120px] h-12 border-2 border-solid border-cyan-600 rounded-lg flex items-center justify-center cursor-pointer hover:bg-cyan-600 hover:text-white transition-colors text-cyan-400 text-xs">
              <span class="font-bold uppercase tracking-wider text-center">Export PNG</span>
            </div>

            <div @click="deleteBuild()" class="flex-1 max-w-[120px] h-12 border-2 border-solid border-red-600 rounded-lg flex items-center justify-center cursor-pointer hover:bg-red-600 hover:text-white transition-colors text-red-400 text-xs">
              <span class="font-bold uppercase tracking-wider text-center">Delete</span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
