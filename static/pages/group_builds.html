<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Albion Tools - Group Builds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style type="text/tailwindcss">
    @theme {
    --color-dark-bg: #121212;
    --color-dark-surface: #1E1E1E;
    --color-dark-border: #2C2C2C;
    --color-dark-text: #E0E0E0;
    --color-dark-muted: #9E9E9E;
    --color-dark-accent: #7E57C2;

    --font-sans: 'Inter', sans-serif;
    --font-serif: 'Playfair Display', serif;
    }
    body {
    margin: 0px;
    padding: 0;
    }
    </style>
    <link rel="stylesheet" href="/static/index.css">
    <script src="/static/js/group_builds.js"></script>
  </head>
  <body class="bg-dark-bg text-dark-text font-sans max-h-screen overflow-y-auto">
    <header class="" x-data="{ html: ''}"
      x-init="fetch('/static/components/navbar.html').then(response => response.text()).then(data => html = data)"
      x-html="html"
    >
    </header>

    <div x-data="groupBuildComponent" class="flex flex-col items-center min-h-screen p-4 py-12 gap-6 bg-dark-bg" x-cloak>

      <template x-if="isLoading">
        <p class="text-white">Loading Compositions...</p>
      </template>

      <template x-for="comp in GroupCompList" :key="comp.id">
        <div 
          @click="window.location.href = `/comps/${comp.id}`"
          class="w-full max-w-2xl bg-dark-surface border border-dark-border shadow-xl rounded-lg p-6 cursor-pointer hover:border-gray-500 transition-colors"
          role="button"
          tabindex="0"
        >

          <h2 class="text-2xl font-bold text-white mb-2" x-text="comp.name"></h2>
          <p class="text-sm text-gray-400 mb-2" x-text="comp.notes"></p>

          <div class="flex flex-row gap-2 overflow-x-auto pb-2 items-start">
            <template x-for="(role, index) in comp.roles" :key="index">
              <div class="flex flex-col items-center flex-shrink-0 w-24">

                <img 
                  :src="WeaponIcons[role.build.weapon]" 
                  :alt="role.name"
                  class="w-16 md:w-24 aspect-square object-contain bg-dark-bg border border-dark-border rounded mb-2"
                >

                <span class="text-xs text-center text-gray-300 font-medium" x-text="role.name"></span>
              </div>
            </template>
          </div>

        </div>
      </template>
    </div>

  </body>
</html>
