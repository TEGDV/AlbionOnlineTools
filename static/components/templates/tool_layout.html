{% extends "base.html" %}
{% block title %}Obsidian | {{ page_title }}{% endblock %}
{% block content %}
    <div class="flex flex-col gap-8">
        <header class="flex justify-between items-center pb-4">
            <div>
                <h1 class="font-serif text-3xl italic text-zinc-100">{{ page_title }}</h1>
                <p class="text-[9px] text-zinc-500 uppercase tracking-widest mt-1">{{ description }}</p>
            </div>
            <a href="/"
               class="text-[10px] text-zinc-500 hover:text-indigo-400 transition-colors uppercase tracking-widest">&larr; Back</a>
        </header>
        <div class="p-8 rounded-md">
            {% block tool %}{% endblock %}
        </div>
    </div>
{% endblock %}
