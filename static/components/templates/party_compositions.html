{% extends "tool_layout.html" %}
{% block tool %}
    <main class="flex-1 flex flex-col min-h-0 max-w-4xl gap-4 mx-auto w-full overflow-y-auto">
        {% for comp in comps %}
            <a href="/party-compositions/{{ comp.id }}"
               class="obsidian-card group p-6 flex flex-col sm:flex-row justify-between items-start md:items-center gap-6 hover:bg-zinc-800/40">
                <div class="flex-1">
                    <h2 class="text-xl font-medium text-zinc-200 mb-1 group-hover:text-indigo-400 transition-colors">{{ comp.name }}</h2>
                    <p class="text-xs text-zinc-500 leading-relaxed max-w-md italic">
                        {{ comp.notes if comp.notes else "No additional field notes provided." }}
                    </p>
                </div>
                <div class="flex -space-x-3 overflow-hidden">
                    {% for role in comp.roles %}
                        <div class="relative inline-block">
                            <img src="{{ role }}"
                                 alt="{{ role.name }}"
                                 class="w-12 h-12 rounded bg-zinc-950/50 ring-1 ring-white/5 image-crisp object-contain"
                                 title="{{ role.name }}">
                        </div>
                    {% endfor %}
                </div>
                <div class="text-zinc-700 group-hover:text-indigo-400/50 transition-colors hidden md:block">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="20"
                         height="20"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                    </svg>
                </div>
            </a>
        {% else %}
            <div class="p-12 border border-dashed border-zinc-800/20 rounded-md text-center">
                <p class="text-[10px] text-zinc-600 uppercase tracking-widest italic">No compositions found in database.</p>
            </div>
        {% endfor %}
    </main>
{% endblock %}
